spring:
  application:
    name: lanime

  web:
    resources:
      static-locations: ["classpath:/static/", "file:./uploads/"]

  # 데이터베이스 연결 설정 (R2DBC)
  r2dbc:
    url: ${DB_URL:r2dbc:postgresql://localhost:5432/lanime}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # 메일 서버 설정 (Gmail SMTP)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # Valkey (Redis) 설정
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# JWT 토큰 설정
jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION:21600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

upload:
  path: ${UPLOAD_PATH:./uploads}
