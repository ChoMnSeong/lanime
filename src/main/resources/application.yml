spring:
  application:
    name: lanime

  web:
    resources:
      static-locations: ["classpath:/static/", "file:./uploads/"]

  # 데이터베이스 연결 설정 (JDBC - Flyway 전용)
  datasource:
    url: ${DB_JDBC_URL:jdbc:postgresql://localhost:5432/lanime}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # 데이터베이스 연결 설정 (R2DBC)
  r2dbc:
    url: ${DB_URL:r2dbc:postgresql://localhost:5432/lanime}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: false  # create 모드에서 clean() 허용

  # 메일 서버 설정 (Gmail SMTP)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # Valkey (Redis) 설정
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # 대용량 영상 업로드를 위한 코덱 버퍼 크기 설정
  codec:
    max-in-memory-size: 512MB

# JWT 토큰 설정
jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION:21600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

upload:
  path: ${UPLOAD_PATH:./uploads}

# DB 마이그레이션 모드
# migrate  : 신규 마이그레이션 파일만 적용 (기본값)
# validate : 스키마 변경 없이 현재 상태 검증만 수행
# create   : DB 전체 초기화 후 마이그레이션 재실행 (데이터 삭제)
db:
  migration-mode: ${DB_MIGRATION_MODE:migrate}

ffmpeg:
  path: ${FFMPEG_PATH:ffmpeg}
